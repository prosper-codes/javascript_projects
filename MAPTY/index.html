<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <title>Mapty+ // Map your workouts</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2330;
      --border: #2a2f3d;
      --accent-run: #ff6b35;
      --accent-cycle: #00d4ff;
      --accent-swim: #a78bfa;
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --danger: #ff4757;
      --success: #2ed573;
      --card-radius: 14px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 360px;
      min-width: 360px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      font-size: 26px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--accent-run);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: var(--transition);
    }

    .btn-icon:hover {
      background: var(--border);
      color: var(--text);
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      background: var(--surface);
      padding: 12px 14px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-btn.active {
      background: var(--accent-run);
      border-color: var(--accent-run);
      color: #fff;
    }

    .filter-btn[data-filter="cycling"].active {
      background: var(--accent-cycle);
      border-color: var(--accent-cycle);
      color: #000;
    }

    .filter-btn[data-filter="swimming"].active {
      background: var(--accent-swim);
      border-color: var(--accent-swim);
      color: #fff;
    }

    /* ── WORKOUT LIST ── */
    .workouts-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .workouts-container::-webkit-scrollbar {
      width: 4px;
    }

    .workouts-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .workouts-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* ── FORM ── */
    .form {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 16px;
      margin-bottom: 10px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form.hidden {
      display: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group.hidden {
      display: none;
    }

    .form__label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
    }

    .form__input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 13px;
      font-family: 'Space Grotesk', sans-serif;
      transition: var(--transition);
      width: 100%;
    }

    .form__input:focus {
      outline: none;
      border-color: var(--accent-run);
    }

    .form__input--type {
      cursor: pointer;
    }

    .form__input option {
      background: var(--surface);
    }

    .form-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 9px 16px;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--accent-run);
      color: #fff;
    }

    .btn-primary:hover {
      background: #ff5520;
    }

    .btn-cancel {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-cancel:hover {
      background: var(--border);
      color: var(--text);
    }

    /* ── WORKOUT CARD ── */
    .workout {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      animation: slideIn 0.3s ease;
      border-left: 3px solid transparent;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-15px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .workout:hover {
      border-color: var(--border);
      transform: translateX(3px);
    }

    .workout--running {
      border-left-color: var(--accent-run);
    }

    .workout--cycling {
      border-left-color: var(--accent-cycle);
    }

    .workout--swimming {
      border-left-color: var(--accent-swim);
    }

    .workout-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .workout__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .workout-actions {
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: var(--transition);
    }

    .workout:hover .workout-actions {
      opacity: 1;
    }

    .workout-action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }

    .workout-action-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .workout-action-btn.delete:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    .workout-action-btn.favorite.active {
      color: #ffd700;
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.1);
    }

    .workout__details-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .workout__detail {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      border-radius: 8px;
      padding: 6px 4px;
    }

    .workout__icon {
      font-size: 14px;
    }

    .workout__value {
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }

    .workout__unit {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── SORT BAR ── */
    .sort-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    .sort-select {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      cursor: pointer;
    }

    .sort-select:focus {
      outline: none;
    }

    .sort-select option {
      background: var(--surface);
      color: var(--text);
    }

    /* ── FOOTER ── */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-size: 11px;
      color: var(--text-muted);
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-reset:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    /* ── MAP ── */
    #map {
      flex: 1;
    }

    /* ── STREAKS / BADGE ── */
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-run);
    }

    /* ── MODAL CONFIRM ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 320px;
      width: 90%;
      transform: scale(0.9);
      transition: var(--transition);
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .modal p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .leaflet-popup-content-wrapper {
      background: var(--surface2) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important;
      font-family: 'Space Grotesk', sans-serif !important;
    }

    .leaflet-popup-tip {
      background: var(--surface2) !important;
    }

    .leaflet-popup-content {
      font-size: 13px !important;
      font-weight: 500 !important;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <!-- Header -->
    <div class="sidebar-header">
      <div class="logo-area">
        <span class="logo-icon">📍</span>
        <span class="logo-text">Map<span>ty+</span></span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btnShowAll" title="Fit all workouts on map">⊞</button>
        <button class="btn-icon" id="btnWeather" title="Weather at location">🌤</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Workouts</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statKm">0</div>
        <div class="stat-label">km total</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statTime">0</div>
        <div class="stat-label">min total</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="running">🏃 Run</button>
      <button class="filter-btn" data-filter="cycling">🚴 Cycle</button>
      <button class="filter-btn" data-filter="swimming">🏊 Swim</button>
    </div>

    <!-- Sort -->
    <div class="sort-bar">
      <span id="workoutCount">0 workouts</span>
      <select class="sort-select" id="sortSelect">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="distance-desc">Longest distance</option>
        <option value="duration-desc">Longest duration</option>
      </select>
    </div>

    <!-- Workout list -->
    <div class="workouts-container" id="workoutsContainer">
      <!-- Form injected here -->
      <form class="form hidden" id="workoutForm">
        <div class="form-grid">
          <div class="form-group full">
            <label class="form__label">Type</label>
            <select class="form__input form__input--type" id="inputType">
              <option value="running">🏃 Running</option>
              <option value="cycling">🚴 Cycling</option>
              <option value="swimming">🏊 Swimming</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form__label">Distance (km)</label>
            <input class="form__input" id="inputDistance" placeholder="0.0" type="number" min="0" step="0.1" />
          </div>
          <div class="form-group">
            <label class="form__label">Duration (min)</label>
            <input class="form__input" id="inputDuration" placeholder="0" type="number" min="0" />
          </div>
          <div class="form-group" id="cadenceGroup">
            <label class="form__label">Cadence (spm)</label>
            <input class="form__input" id="inputCadence" placeholder="step/min" type="number" min="0" />
          </div>
          <div class="form-group hidden" id="elevationGroup">
            <label class="form__label">Elev Gain (m)</label>
            <input class="form__input" id="inputElevation" placeholder="meters" type="number" />
          </div>
          <div class="form-group hidden" id="strokeGroup">
            <label class="form__label">Stroke Rate</label>
            <input class="form__input" id="inputStroke" placeholder="strokes/min" type="number" min="0" />
          </div>
          <div class="form-group full">
            <label class="form__label">Notes (optional)</label>
            <input class="form__input" id="inputNotes" placeholder="How was it?" />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="formSubmitBtn">Save Workout</button>
          <button type="button" class="btn btn-cancel" id="formCancelBtn">Cancel</button>
        </div>
      </form>

      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">🗺️</div>
        <h3>No workouts yet</h3>
        <p>Click anywhere on the map to log your first workout!</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      <span class="footer-text">© Mapty+ Enhanced</span>
      <button class="btn-reset" id="btnReset">🗑 Clear All</button>
    </div>
  </div>

  <div id="map"></div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Delete modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>Delete Workout?</h3>
      <p>This will permanently remove the workout and its map marker. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="confirmDelete" style="background:var(--danger)">Delete</button>
        <button class="btn btn-cancel" id="cancelDelete">Keep it</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    // ── MODELS ──────────────────────────────────────────────────────────────────

    class Workout {
      date = new Date();
      id = (Date.now() + '').slice(-10);
      favorite = false;
      notes = '';

      constructor(coords, distance, duration) {
        this.coords = coords;
        this.distance = distance;
        this.duration = duration;
      }

      _setDescription() {
        const months = ['January', 'February', 'March', 'April', 'May', 'June',
          'July', 'August', 'September', 'October', 'November', 'December'];
        this.description = `${this.type[0].toUpperCase()}${this.type.slice(1)} on ${months[this.date.getMonth()]} ${this.date.getDate()}`;
      }
    }

    class Running extends Workout {
      type = 'running';
      constructor(coords, distance, duration, cadence, notes = '') {
        super(coords, distance, duration);
        this.cadence = cadence;
        this.notes = notes;
        this.pace = this.duration / this.distance;
        this._setDescription();
      }
    }

    class Cycling extends Workout {
      type = 'cycling';
      constructor(coords, distance, duration, elevationGain, notes = '') {
        super(coords, distance, duration);
        this.elevationGain = elevationGain;
        this.notes = notes;
        this.speed = this.distance / (this.duration / 60);
        this._setDescription();
      }
    }

    class Swimming extends Workout {
      type = 'swimming';
      constructor(coords, distance, duration, strokeRate, notes = '') {
        super(coords, distance, duration);
        this.strokeRate = strokeRate;
        this.notes = notes;
        this.pace = this.duration / this.distance;
        this._setDescription();
      }
    }

    // ── APP ──────────────────────────────────────────────────────────────────────

    class App {
      #map;
      #mapZoomLevel = 13;
      #mapEvent;
      #workouts = [];
      #markers = {};
      #activeFilter = 'all';
      #sortOrder = 'date-desc';
      #editingId = null;
      #deleteTargetId = null;

      constructor() {
        this._getPosition();
        this._getLocalStorage();
        this._bindEvents();
        this._updateStats();
        this._renderAllWorkouts();
      }

      _bindEvents() {
        document.getElementById('workoutForm').addEventListener('submit', e => this._handleSubmit(e));
        document.getElementById('formCancelBtn').addEventListener('click', () => this._hideForm());
        document.getElementById('inputType').addEventListener('change', () => this._toggleFields());

        document.querySelectorAll('.filter-btn').forEach(btn =>
          btn.addEventListener('click', e => this._setFilter(e.target.dataset.filter)));

        document.getElementById('sortSelect').addEventListener('change', e => {
          this.#sortOrder = e.target.value;
          this._renderAllWorkouts();
        });

        document.getElementById('workoutsContainer').addEventListener('click', e => this._handleListClick(e));

        document.getElementById('btnShowAll').addEventListener('click', () => this._fitAllMarkers());
        document.getElementById('btnReset').addEventListener('click', () => this._confirmReset());
        document.getElementById('btnWeather').addEventListener('click', () => this._showWeatherInfo());

        document.getElementById('confirmDelete').addEventListener('click', () => this._deleteWorkout());
        document.getElementById('cancelDelete').addEventListener('click', () => this._hideDeleteModal());
        document.getElementById('deleteModal').addEventListener('click', e => {
          if (e.target === document.getElementById('deleteModal')) this._hideDeleteModal();
        });
      }

      _getPosition() {
        if (navigator.geolocation)
          navigator.geolocation.getCurrentPosition(p => this._loadMap(p), () => {
            // Default to a nice location if no permission
            this._loadMap({ coords: { latitude: 51.505, longitude: -0.09 } });
            this._showToast('📍 Using default location (London)');
          });
      }

      _loadMap(position) {
        const { latitude, longitude } = position.coords;
        this.#map = L.map('map', { zoomControl: false }).setView([latitude, longitude], this.#mapZoomLevel);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap &copy; CARTO',
          maxZoom: 19,
        }).addTo(this.#map);

        L.control.zoom({ position: 'bottomright' }).addTo(this.#map);

        this.#map.on('click', e => this._showForm(e));

        this.#workouts.forEach(w => this._renderMarker(w));
      }

      _showForm(mapE) {
        this.#mapEvent = mapE;
        this.#editingId = null;
        document.getElementById('formSubmitBtn').textContent = 'Save Workout';
        this._clearForm();
        const form = document.getElementById('workoutForm');
        form.classList.remove('hidden');
        document.getElementById('inputDistance').focus();
        this._scrollFormIntoView();
      }

      _hideForm() {
        document.getElementById('workoutForm').classList.add('hidden');
        this._clearForm();
        this.#editingId = null;
      }

      _clearForm() {
        ['inputDistance', 'inputDuration', 'inputCadence', 'inputElevation', 'inputStroke', 'inputNotes']
          .forEach(id => document.getElementById(id).value = '');
        document.getElementById('inputType').value = 'running';
        this._toggleFields();
      }

      _toggleFields() {
        const type = document.getElementById('inputType').value;
        document.getElementById('cadenceGroup').classList.toggle('hidden', type !== 'running');
        document.getElementById('elevationGroup').classList.toggle('hidden', type !== 'cycling');
        document.getElementById('strokeGroup').classList.toggle('hidden', type !== 'swimming');
      }

      _handleSubmit(e) {
        e.preventDefault();
        const type = document.getElementById('inputType').value;
        const distance = +document.getElementById('inputDistance').value;
        const duration = +document.getElementById('inputDuration').value;
        const notes = document.getElementById('inputNotes').value;

        if (!distance || !duration || distance <= 0 || duration <= 0)
          return this._showToast('⚠️ Distance and duration must be positive numbers!');

        if (this.#editingId) {
          // EDIT existing
          const idx = this.#workouts.findIndex(w => w.id === this.#editingId);
          const old = this.#workouts[idx];
          let updated;

          if (type === 'running') {
            const cadence = +document.getElementById('inputCadence').value;
            if (!cadence || cadence <= 0) return this._showToast('⚠️ Cadence must be a positive number!');
            updated = new Running(old.coords, distance, duration, cadence, notes);
          } else if (type === 'cycling') {
            const elevation = +document.getElementById('inputElevation').value;
            updated = new Cycling(old.coords, distance, duration, elevation, notes);
          } else {
            const stroke = +document.getElementById('inputStroke').value;
            updated = new Swimming(old.coords, distance, duration, stroke, notes);
          }
          updated.id = old.id;
          updated.date = old.date;
          updated.favorite = old.favorite;

          this.#workouts[idx] = updated;
          this._removeMarker(updated.id);
          this._renderMarker(updated);
          this._hideForm();
          this._saveLocalStorage();
          this._renderAllWorkouts();
          this._updateStats();
          this._showToast('✏️ Workout updated!');
          return;
        }

        // NEW workout
        const { lat, lng } = this.#mapEvent.latlng;
        let workout;

        if (type === 'running') {
          const cadence = +document.getElementById('inputCadence').value;
          if (!cadence || cadence <= 0) return this._showToast('⚠️ Cadence must be a positive number!');
          workout = new Running([lat, lng], distance, duration, cadence, notes);
        } else if (type === 'cycling') {
          const elevation = +document.getElementById('inputElevation').value;
          workout = new Cycling([lat, lng], distance, duration, elevation, notes);
        } else {
          const stroke = +document.getElementById('inputStroke').value;
          workout = new Swimming([lat, lng], distance, duration, stroke, notes);
        }

        this.#workouts.push(workout);
        this._renderMarker(workout);
        this._hideForm();
        this._saveLocalStorage();
        this._renderAllWorkouts();
        this._updateStats();
        this._showStreak();
        this._showToast(`${this._typeEmoji(workout.type)} Workout logged!`);
      }

      _renderMarker(workout) {
        const colors = { running: '#ff6b35', cycling: '#00d4ff', swimming: '#a78bfa' };
        const icon = L.divIcon({
          html: `<div style="background:${colors[workout.type]};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 0 4px ${colors[workout.type]}33,0 4px 12px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.2);">${this._typeEmoji(workout.type)}</div>`,
          className: '',
          iconSize: [32, 32],
          iconAnchor: [16, 16],
        });

        const marker = L.marker(workout.coords, { icon })
          .addTo(this.#map)
          .bindPopup(L.popup({ maxWidth: 220, minWidth: 100, autoClose: false, closeOnClick: false, className: `${workout.type}-popup` }))
          .setPopupContent(`${this._typeEmoji(workout.type)} <strong>${workout.description}</strong><br><small>${workout.distance} km · ${workout.duration} min</small>`)
          .openPopup();

        this.#markers[workout.id] = marker;
      }

      _removeMarker(id) {
        if (this.#markers[id]) {
          this.#map.removeLayer(this.#markers[id]);
          delete this.#markers[id];
        }
      }

      _renderAllWorkouts() {
        const container = document.getElementById('workoutsContainer');
        // Remove old cards (keep form)
        container.querySelectorAll('.workout-card').forEach(el => el.remove());

        let list = [...this.#workouts];

        // Filter
        if (this.#activeFilter !== 'all')
          list = list.filter(w => w.type === this.#activeFilter);

        // Sort
        const [key, dir] = this.#sortOrder.split('-');
        list.sort((a, b) => {
          const aVal = key === 'date' ? new Date(a.date) : a[key === 'distance' ? 'distance' : 'duration'];
          const bVal = key === 'date' ? new Date(b.date) : b[key === 'distance' ? 'distance' : 'duration'];
          return dir === 'desc' ? bVal - aVal : aVal - bVal;
        });

        const empty = document.getElementById('emptyState');
        if (list.length === 0) {
          empty.classList.remove('hidden');
        } else {
          empty.classList.add('hidden');
          list.forEach(w => this._renderWorkoutCard(w));
        }

        document.getElementById('workoutCount').textContent = `${list.length} workout${list.length !== 1 ? 's' : ''}`;
      }

      _renderWorkoutCard(workout) {
        const container = document.getElementById('workoutsContainer');
        const d = new Date(workout.date);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const colors = { running: 'var(--accent-run)', cycling: 'var(--accent-cycle)', swimming: 'var(--accent-swim)' };

        let extraDetails = '';
        if (workout.type === 'running') {
          const pace = (workout.duration / workout.distance).toFixed(1);
          extraDetails = `
        <div class="workout__detail">
          <span class="workout__icon">⚡️</span>
          <span class="workout__value">${pace}</span>
          <span class="workout__unit">min/km</span>
        </div>
        <div class="workout__detail">
          <span class="workout__icon">🦶</span>
          <span class="workout__value">${workout.cadence}</span>
          <span class="workout__unit">spm</span>
        </div>`;
        } else if (workout.type === 'cycling') {
          const speed = (workout.distance / (workout.duration / 60)).toFixed(1);
          extraDetails = `
        <div class="workout__detail">
          <span class="workout__icon">⚡️</span>
          <span class="workout__value">${speed}</span>
          <span class="workout__unit">km/h</span>
        </div>
        <div class="workout__detail">
          <span class="workout__icon">⛰</span>
          <span class="workout__value">${workout.elevationGain}</span>
          <span class="workout__unit">m</span>
        </div>`;
        } else {
          const pace = (workout.duration / workout.distance).toFixed(1);
          extraDetails = `
        <div class="workout__detail">
          <span class="workout__icon">⚡️</span>
          <span class="workout__value">${pace}</span>
          <span class="workout__unit">min/km</span>
        </div>
        <div class="workout__detail">
          <span class="workout__icon">🌊</span>
          <span class="workout__value">${workout.strokeRate || '–'}</span>
          <span class="workout__unit">spm</span>
        </div>`;
        }

        const html = `
      <div class="workout-card workout--${workout.type}" data-id="${workout.id}" style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid ${colors[workout.type]};border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:0.2s;position:relative;animation:slideIn 0.3s ease;">
        <div class="workout-header">
          <div>
            <h2 class="workout__title">${this._typeEmoji(workout.type)} ${workout.description}
              ${workout.favorite ? ' <span style="color:#ffd700">★</span>' : ''}
            </h2>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${dateStr}${workout.notes ? ` · ${workout.notes}` : ''}</div>
          </div>
          <div class="workout-actions">
            <button class="workout-action-btn favorite ${workout.favorite ? 'active' : ''}" data-action="favorite" data-id="${workout.id}" title="Favourite">⭐</button>
            <button class="workout-action-btn" data-action="edit" data-id="${workout.id}" title="Edit">✏️</button>
            <button class="workout-action-btn delete" data-action="delete" data-id="${workout.id}" title="Delete">🗑</button>
          </div>
        </div>
        <div class="workout__details-grid">
          <div class="workout__detail">
            <span class="workout__icon">${this._typeEmoji(workout.type)}</span>
            <span class="workout__value">${workout.distance}</span>
            <span class="workout__unit">km</span>
          </div>
          <div class="workout__detail">
            <span class="workout__icon">⏱</span>
            <span class="workout__value">${workout.duration}</span>
            <span class="workout__unit">min</span>
          </div>
          ${extraDetails}
        </div>
      </div>`;

        document.getElementById('workoutsContainer').insertAdjacentHTML('beforeend', html);
      }

      _handleListClick(e) {
        const actionBtn = e.target.closest('[data-action]');
        if (actionBtn) {
          const { action, id } = actionBtn.dataset;
          e.stopPropagation();
          if (action === 'delete') this._showDeleteModal(id);
          if (action === 'edit') this._startEdit(id);
          if (action === 'favorite') this._toggleFavorite(id);
          return;
        }

        const card = e.target.closest('.workout-card');
        if (!card || !this.#map) return;
        const workout = this.#workouts.find(w => w.id === card.dataset.id);
        if (!workout) return;
        this.#map.setView(workout.coords, this.#mapZoomLevel, { animate: true, pan: { duration: 1 } });
        if (this.#markers[workout.id]) this.#markers[workout.id].openPopup();
      }

      _startEdit(id) {
        const workout = this.#workouts.find(w => w.id === id);
        if (!workout) return;

        this.#editingId = id;
        this.#mapEvent = { latlng: { lat: workout.coords[0], lng: workout.coords[1] } };

        const form = document.getElementById('workoutForm');
        form.classList.remove('hidden');
        document.getElementById('inputType').value = workout.type;
        this._toggleFields();
        document.getElementById('inputDistance').value = workout.distance;
        document.getElementById('inputDuration').value = workout.duration;
        document.getElementById('inputNotes').value = workout.notes || '';

        if (workout.type === 'running') document.getElementById('inputCadence').value = workout.cadence;
        if (workout.type === 'cycling') document.getElementById('inputElevation').value = workout.elevationGain;
        if (workout.type === 'swimming') document.getElementById('inputStroke').value = workout.strokeRate || '';

        document.getElementById('formSubmitBtn').textContent = 'Update Workout';
        this._scrollFormIntoView();
        document.getElementById('inputDistance').focus();
      }

      _toggleFavorite(id) {
        const workout = this.#workouts.find(w => w.id === id);
        if (!workout) return;
        workout.favorite = !workout.favorite;
        this._saveLocalStorage();
        this._renderAllWorkouts();
        this._showToast(workout.favorite ? '⭐ Added to favourites!' : '☆ Removed from favourites');
      }

      _showDeleteModal(id) {
        this.#deleteTargetId = id;
        document.getElementById('deleteModal').classList.add('active');
      }

      _hideDeleteModal() {
        this.#deleteTargetId = null;
        document.getElementById('deleteModal').classList.remove('active');
      }

      _deleteWorkout() {
        const id = this.#deleteTargetId;
        if (!id) return;
        this._removeMarker(id);
        this.#workouts = this.#workouts.filter(w => w.id !== id);
        this._saveLocalStorage();
        this._renderAllWorkouts();
        this._updateStats();
        this._hideDeleteModal();
        this._showToast('🗑 Workout deleted');
      }

      _fitAllMarkers() {
        if (this.#workouts.length === 0) return this._showToast('No workouts to show!');
        const coords = this.#workouts.map(w => w.coords);
        this.#map.fitBounds(L.latLngBounds(coords), { padding: [50, 50] });
      }

      _showWeatherInfo() {
        if (!this.#map) return;
        const center = this.#map.getCenter();
        this._showToast(`🌤 Location: ${center.lat.toFixed(2)}°, ${center.lng.toFixed(2)}°`);
      }

      _confirmReset() {
        if (confirm('Delete ALL workouts? This cannot be undone.')) {
          Object.keys(this.#markers).forEach(id => this._removeMarker(id));
          this.#workouts = [];
          this._saveLocalStorage();
          this._renderAllWorkouts();
          this._updateStats();
          this._showToast('🗑 All workouts cleared');
        }
      }

      _updateStats() {
        const total = this.#workouts.length;
        const km = this.#workouts.reduce((sum, w) => sum + w.distance, 0);
        const mins = this.#workouts.reduce((sum, w) => sum + w.duration, 0);

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statKm').textContent = km % 1 === 0 ? km : km.toFixed(1);
        document.getElementById('statTime').textContent = mins >= 60 ? `${(mins / 60).toFixed(1)}h` : mins;
      }

      _setFilter(filter) {
        this.#activeFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
        this._renderAllWorkouts();
      }

      _showStreak() {
        const count = this.#workouts.length;
        if (count === 1) this._showToast('🎉 First workout logged! Great start!');
        else if (count === 5) this._showToast('🔥 5 workouts! You\'re on fire!');
        else if (count === 10) this._showToast('🏆 10 workouts! Incredible consistency!');
        else if (count % 10 === 0) this._showToast(`🏆 ${count} workouts! Legend!`);
      }

      _showToast(message) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
      }

      _typeEmoji(type) {
        return { running: '🏃‍♂️', cycling: '🚴‍♀️', swimming: '🏊' }[type] || '🏃';
      }

      _scrollFormIntoView() {
        document.getElementById('workoutForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      _saveLocalStorage() {
        localStorage.setItem('maptyPlus_workouts', JSON.stringify(this.#workouts));
      }

      _getLocalStorage() {
        const data = JSON.parse(localStorage.getItem('maptyPlus_workouts'));
        if (!data) return;
        this.#workouts = data.map(w => {
          let obj;
          if (w.type === 'running') obj = new Running(w.coords, w.distance, w.duration, w.cadence, w.notes);
          else if (w.type === 'cycling') obj = new Cycling(w.coords, w.distance, w.duration, w.elevationGain, w.notes);
          else obj = new Swimming(w.coords, w.distance, w.duration, w.strokeRate, w.notes);
          obj.id = w.id;
          obj.date = new Date(w.date);
          obj.favorite = w.favorite || false;
          obj._setDescription();
          return obj;
        });
      }
    }

    const app = new App();
  </script>
</body>
